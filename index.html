<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Narrow | DachXD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- 1. IMPORT MAP: Must be first. Points 'three' to the actual library file -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com"
        }
    }
    </script>

    <!-- 2. GAME LOGIC: Loading from the official server so it works in your browser -->
    <script type="module" src="https://narrow.one"></script>
    <script type="module" src="https://narrow.one"></script>

    <!-- 3. STYLE SECTION: Merged and cleaned for iframe compatibility -->
    <style>
        body, html {
            position: relative;
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            user-select: none;
            -webkit-user-select: none;
            font-family: sans-serif;
        }

        @font-face {
            font-family: 'BlueNight';
            font-display: swap;
            src: url(https://narrow.one) format('woff2');
        }

        .blueNight { font-family: 'BlueNight', sans-serif; text-transform: lowercase; }
        .fullScreen { position: absolute; width: 100%; height: 100%; left: 0; top: 0; }

        .mainInfoText {
            font-size: 50px;
            position: absolute;
            left: 0;
            width: 100%;
            top: 50%;
            text-align: center;
            pointer-events: none;
            z-index: 11;
        }

        .whiteBigText {
            color: white;
            -webkit-text-stroke: 1px black;
        }

        .scaleBounce { animation: 0.7s ease-in-out infinite alternate scaleBounce; }
        @keyframes scaleBounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        #mainMenuLogo {
            background: url(https://narrow.one) no-repeat center;
            position: absolute;
            width: 450px;
            height: 300px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        #loadingImage {
            object-fit: cover;
            filter: blur(max(1vh,1vw));
            transform: scale(1.04);
            pointer-events: none;
        }
    </style>
</head>
<body ontouchstart="">
    <div id="gameWrapper">
        <!-- Overlay Text -->
        <div id="mainInfoTextContainer" class="fullScreen">
            <div id="mainInfoText" class="mainInfoText blueNight whiteBigText scaleBounce">Loading...</div>
        </div>
        
        <!-- Main Menu -->
        <div id="mainMenu" class="fullScreen">
            <div id="mainMenuLogo"></div>
        </div>

        <!-- Loading Image -->
        <div id="loadingImageContainer" class="fullScreen">
            <img src="https://narrow.one" id="loadingImage" class="fullScreen">
        </div>
    </div>

    <!-- Script to handle keyboard focus -->
    <script type="module">
        let fn = e => { if (e.code == "Escape") e.preventDefault(); };
        window.addEventListener("keydown", fn);
    </script>
</body>
</html>
